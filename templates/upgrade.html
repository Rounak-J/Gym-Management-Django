<!DOCTYPE html>
<html>
<head>
    <title>Upgrade Membership</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0">Upgrade Plan: {{ member.full_name }}</h4>
                    </div>
                    <div class="card-body">
                        <p><strong>Current Plan:</strong> 
                            <span class="badge bg-primary">{{ member.plan.name }} (Tier {{ member.plan.tier_level }})</span>
                        </p>

                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="form-label">Select New Higher Tier Plan (Monthly Cost)</label>
                                <select name="new_plan" class="form-select" required>
                                    <option value="" disabled selected>-- Choose Upgrade --</option>
                                    {% for plan in plans %}
                                        {% if plan.tier_level > member.plan.tier_level %}
                                            <option value="{{ plan.id }}">
                                                {{ plan.name }} (Tier {{ plan.tier_level }}) - ₹{{ plan.price }}
                                            </option>
                                        {% endif %}
                                    {% endfor %}
                                </select>
                                <div id="emailHelp" class="form-text text-danger">
                                    Note: You cannot downgrade to a lower tier.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-warning w-100">Confirm Upgrade</button>
                            <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2">Cancel and Go Back</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
