<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Paradise | Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 20px; }
        .btn-dark { background-color: #1a1a1a; border: none; transition: 0.3s; }
        .btn-dark:hover { background-color: #333; transform: translateY(-2px); }
        /* These focus styles only work if the input exists */
        .form-control:focus, .form-select:focus { border-color: #1a1a1a; box-shadow: none; }
        .input-group-text { background-color: #fff; border-right: none; }
        .form-control { border-left: none; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <a href="{% url 'dashboard' %}" class="btn btn-link text-dark mb-3 text-decoration-none p-0">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>

            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill fs-1 text-success"></i>
                        <h2 class="fw-bold mt-2">New Member</h2>
                        <p class="text-muted">Enter details to start the membership</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="full_name" class="form-control" placeholder="Rahul Jaiswal" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="rahul@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Select Membership Plan</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-card-checklist"></i></span>
                                <select name="plan" class="form-select" required>
                                    <option value="" disabled selected>-- Choose a Plan --</option>
                                    {% for plan in plans %}
                                        <option value="{{ plan.id }}">{{ plan.name }} - ₹{{ plan.price }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Duration (Months)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar-range"></i></span>
                                <input type="number" name="months" class="form-control" min="1" max="12" value="1" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-3 fw-bold">CONFIRM REGISTRATION</button>
                    </form>
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
