{% extends 'base.html' %}

{% block page_title %}Management Console{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 p-4" style="border-radius: 16px;">
            <h3 class="fw-bold mb-4 text-center">Initial Registration</h3>
            
            <form method="POST" novalidate>
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted text-uppercase">Full Name</label>
                    <input type="text" name="full_name" class="form-control py-2 shadow-sm" placeholder="e.g. Rounak Jaiswal" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted text-uppercase">Email Address</label>
                    <input type="email" name="email" 
                           class="form-control py-2 shadow-sm 
                           {% if messages %}
                               {% for message in messages %}
                                   {% if message.tags == 'error' %}is-invalid{% elif message.tags == 'success' %}is-valid{% endif %}
                               {% endfor %}
                           {% endif %}" 
                           placeholder="rounak@example.com" required>
                    
                    <div class="invalid-feedback text-danger fw-bold mt-2">
                        <i class="bi bi-exclamation-circle-fill me-1" style="color: #dc3545;"></i> 
                        This email is already registered in the system.
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted text-uppercase">Phone Number</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                        <input type="text" name="phone_number" class="form-control py-2 border-start-0" placeholder="+91 XXXXX XXXXX" required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark py-3 fw-bold text-uppercase shadow-sm" style="letter-spacing: 1px;">
                        SAVE & CONTINUE <i class="bi bi-arrow-right-short ms-1"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted small">Step 1 of 2: Create profile, then assign plan in the Members tab.</p>
        </div>
    </div>
</div>

<style>
    .is-invalid {
        border: 2px solid #dc3545 !important;
        background-image: none !important; /* Removes default browser icon to keep it clean */
    }
    .is-valid {
        border: 2px solid #00ff88 !important; /* Prodigy Forge Green */
        background-image: none !important;
    }
    .card {
        background: #ffffff;
    }
    .form-control:focus {
        box-shadow: 0 0 0 0.25rem rgba(0, 0, 0, 0.1);
        border-color: #1a1a1a;
    }
</style>
{% endblock %}
