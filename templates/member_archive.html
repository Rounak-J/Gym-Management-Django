{% extends 'base.html' %}
{% block page_title %}Member Archive & Contacts{% endblock %}
{% block content %}
<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr><th class="ps-4">Name</th><th>Email</th><th>Last Plan</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr>
                    <td class="ps-4 fw-bold">{{ member.full_name }}</td>
                    <td><a href="mailto:{{ member.email }}" class="text-decoration-none">{{ member.email }}</a></td>
                    <td>{{ member.plan.name }}</td>
                    <td>
                        <form action="{% url 'restore_member' member.id %}" method="POST" class="d-inline">
                            {% csrf_token %}<button type="submit" class="btn btn-sm btn-success">Restore</button>
                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center py-5">Archive empty.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
