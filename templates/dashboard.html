{% extends 'base.html' %}

{% block page_title %}System Overview{% endblock %}

{% block content %}
<div class="row g-4">
    
    <div class="col-xl-3 col-md-6">
        <div class="card border-0 shadow-sm h-100 bg-dark text-white border-bottom border-success border-4">
            <div class="card-body p-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-3">Members</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="fw-bold mb-0 text-success">Members</h2>
                    <i class="bi bi-people-fill fs-1 opacity-25 text-success"></i>
                </div>
            </div>
            <a href="{% url 'members_list' %}" class="card-footer bg-transparent border-0 text-center py-2 text-success text-decoration-none border-top border-secondary">
                <small>See More <i class="bi bi-arrow-right-circle ms-1"></i></small>
            </a>
        </div>
    </div>

    <div class="col-xl-3 col-md-6">
        <div class="card border-0 shadow-sm h-100 bg-dark text-white border-bottom border-warning border-4">
            <div class="card-body p-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-3">Tier Benefits</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="fw-bold mb-0 text-warning">Tier Benefits</h2>
                    <i class="bi bi-gem fs-1 opacity-25 text-warning"></i>
                </div>
            </div>
            <a href="{% url 'tier_benefits' %}" class="card-footer bg-transparent border-0 text-center py-2 text-warning text-decoration-none border-top border-secondary">
                <small>See More <i class="bi bi-arrow-right-circle ms-1"></i></small>
            </a>
        </div>
    </div>

    <div class="col-xl-3 col-md-6">
        <div class="card border-0 shadow-sm h-100 bg-dark text-white border-bottom border-danger border-4">
            <div class="card-body p-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-3">Archive & Contacts</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="fw-bold mb-0 text-danger">Archive & Contacts</h2>
                    <i class="bi bi-journal-medical fs-1 opacity-25 text-danger"></i>
                </div>
            </div>
            <a href="{% url 'member_archive' %}" class="card-footer bg-transparent border-0 text-center py-2 text-danger text-decoration-none border-top border-secondary">
                <small>See More <i class="bi bi-arrow-right-circle ms-1"></i></small>
            </a>
        </div>
    </div>

    <div class="col-xl-3 col-md-6">
        <div class="card border-0 shadow-sm h-100 bg-dark text-white border-bottom border-primary border-4">
            <div class="card-body p-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-3">Workout Plans</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="fw-bold mb-0 text-primary">Workout Plans</h2>
                    <i class="bi bi-person-lines-fill fs-1 opacity-25 text-primary"></i>
                </div>
            </div>
            <a href="{% url 'workout_plans' %}" class="card-footer bg-transparent border-0 text-center py-2 text-primary text-decoration-none border-top border-secondary">
                <small>See More <i class="bi bi-arrow-right-circle ms-1"></i></small>
            </a>
        </div>
    </div>

</div>
{% endblock %}
